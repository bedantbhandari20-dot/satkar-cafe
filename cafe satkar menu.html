                  {/* Card 1: Hours */}
                  <div className="flex items-center gap-4 p-4 rounded-2xl bg-white/40 border border-white/60 shadow-sm transition-all hover:bg-white/60 hover:shadow-md group">
                    <div className="w-10 h-10 rounded-xl flex items-center justify-center bg-espresso-100/80 text-espresso-700 border border-espresso-200/20 group-hover:scale-110 transition-transform">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-5 h-5 animate-pulse"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    </div>
                    <div>
                      <p className="text-[9px] text-espresso-400 uppercase font-bold tracking-widest mb-0.5">Hours</p>
                      <p className="text-xs font-semibold text-espresso-900">Open Daily: 8:00 AM – 10:00 PM</p>
                    </div>
                  </div>

                  {/* Card 2: Contact */}
                  <a 
                    href="tel:+9779858427130" 
                    className="flex items-center gap-4 p-4 rounded-2xl bg-white/40 border border-white/60 shadow-sm transition-all hover:bg-white/60 hover:shadow-md group"
                    onClick={(e) => e.stopPropagation()}
                  >
                    <div className="w-10 h-10 rounded-xl flex items-center justify-center bg-espresso-100/80 text-espresso-700 border border-espresso-200/20 group-hover:scale-110 group-hover:rotate-12 transition-all duration-300">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-5 h-5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                    </div>
                    <div>
                      <p className="text-[9px] text-espresso-400 uppercase font-bold tracking-widest mb-0.5">Call Us</p>
                      <p className="text-xs font-semibold text-espresso-900 group-hover:text-gold-600 transition-colors">+977 9858427130</p>
                    </div>
                  </a>

                  {/* Card 3: Payments */}
                  <div className="flex items-center gap-4 p-4 rounded-2xl bg-white/40 border border-white/60 shadow-sm transition-all hover:bg-white/60 hover:shadow-md group">
                    <div className="w-10 h-10 rounded-xl flex items-center justify-center bg-espresso-100/80 text-espresso-700 border border-espresso-200/20 group-hover:scale-110 transition-transform">
                      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="w-5 h-5"><rect x="2" y="5" width="20" height="14" rx="2" ry="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                    </div>
                    <div className="flex-1">
                      <p className="text-[9px] text-espresso-400 uppercase font-bold tracking-widest mb-1">Payment</p>
                      <div className="flex gap-1.5 flex-wrap">
                        <span className="text-[9px] font-bold px-2 py-0.5 rounded-md bg-espresso-950/5 text-espresso-800 border border-espresso-950/10">Cash</span>
                        <span className="text-[9px] font-bold px-2 py-0.5 rounded-md bg-espresso-950/5 text-espresso-800 border border-espresso-950/10">Fonepay</span>
                        <span className="text-[9px] font-bold px-2 py-0.5 rounded-md bg-espresso-950/5 text-espresso-800 border border-espresso-950/10">QR Scan</span>
                      </div>
                    </div>
                  </div>
                </div>

                {/* Action Area & Social Links */}
                <div className="flex flex-col gap-4 mt-2">
                  <a 
                    href="https://maps.google.com/?q=Satkar+Bakery+Cafe+Dipayal+Doti+Nepal" 
                    target="_blank" 
                    rel="noopener noreferrer"
                    className="flex items-center justify-center gap-2 w-full py-3.5 rounded-2xl text-espresso-950 font-bold text-[13px] tracking-wider transition-all haptic-medium active:scale-[0.98] hover:shadow-lg hover:shadow-gold-500/10"
                    style={{
                      background: 'linear-gradient(135deg, #D9AE63 0%, #B58A44 100%)',
                      boxShadow: 'inset 0 1px 1px rgba(255,255,255,0.4), 0 4px 20px rgba(181, 138, 68, 0.3)'
                    }}
                    onClick={(e) => e.stopPropagation()}
                    aria-label="Get directions on Google Maps"
                  >
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" className="w-4 h-4"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                    Get Directions

                  {/* Social Links */}
                  <div className="flex items-center justify-center gap-4 mt-1">
                    <a 
                      href="https://www.facebook.com/share/1NkZZFaUgb/" 
                      target="_blank" 
                      rel="noopener noreferrer"

                      aria-label="Facebook"
                      onClick={(e) => e.stopPropagation()}
                    >
                      <svg viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                    </a>
                    <a 
                      href="https://www.instagram.com/satkarbakerycafe?igsh=azBzMDdlaW5hMjZk" 
                      target="_blank" 
                      rel="noopener noreferrer"
                      className="w-11 h-11 flex items-center justify-center rounded-xl bg-white/40 border border-white/60 text-espresso-700 hover:bg-white hover:text-espresso-900 transition-all hover:scale-105 active:scale-95 shadow-sm hover:shadow-md"
                      aria-label="Instagram"
                      onClick={(e) => e.stopPropagation()}
                    >
                      <svg viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
                    </a>
                    <a 
                      href="https://wa.me/9779858427130" 
                      target="_blank" 
                      rel="noopener noreferrer"
                      className="w-11 h-11 flex items-center justify-center rounded-xl bg-white/40 border border-white/60 text-espresso-700 hover:bg-white hover:text-espresso-900 transition-all hover:scale-105 active:scale-95 shadow-sm hover:shadow-md"
                      aria-label="WhatsApp"
                      onClick={(e) => e.stopPropagation()}
                    >
                      <svg viewBox="0 0 24 24" fill="currentColor" className="w-5 h-5"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                    </a>
                  </div>
                </div>
              </div>

              {/* Copyright & Info outside card */}
              <div className="mt-10 border-t border-espresso-200/10 pt-6 max-w-xs mx-auto">
                <div className="text-[10px] text-espresso-400/60 font-sans tracking-wide">
                  <p className="font-medium">© {new Date().getFullYear()} Satkar Bakery & Cafe</p>
                  <p className="mt-0.5 font-light">All Rights Reserved</p>
                </div>
                <button 
                  className="mt-3.5 inline-flex items-center gap-1.5 text-[9px] font-bold uppercase tracking-widest text-espresso-400 hover:text-gold-600 active:scale-95 transition-all"
                  aria-label="Staff Access"
                  onClick={(e) => { e.stopPropagation(); handleAdminTrigger(); }}
                >
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3 h-3"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                  Staff Portal
                </button>
              </div>
            </footer>
          )}
        </div>
        </>
      );
    };

    class ErrorBoundary extends React.Component {
      constructor(p) { super(p); this.state = { err: null }; }
      static getDerivedStateFromError(e) { return { err: e }; }
      render() {
        if (this.state.err) return (
          <div style={{padding:'2rem',textAlign:'center',fontFamily:'sans-serif'}}>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{width: '3rem', height: '3rem', margin: '0 auto 1rem', color: '#1c1208'}}>
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <p style={{fontWeight:600,marginBottom:'0.5rem'}}>Something went wrong</p>
            <p style={{color:'#888',fontSize:'0.875rem',marginBottom:'1.5rem'}}>{this.state.err.message}</p>
            <button onClick={()=>window.location.reload()} style={{background:'#1c1208',color:'#fff',border:'none',borderRadius:'999px',padding:'0.75rem 2rem',cursor:'pointer',fontWeight:600}}>Reload App</button>
          </div>
        );
        return this.props.children;
      }
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
